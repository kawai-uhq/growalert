<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript Viewer — GrowAlert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #00ff88;
      --bg: #050a06;
      --surface: #0f1f12;
      --border: rgba(0,255,136,0.12);
      --text: #e8f5eb;
      --text-muted: #6a8a70;
      --red: #ff4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      height: 52px;
      background: rgba(5,10,6,0.95);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      gap: 16px;
      backdrop-filter: blur(8px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .topbar-logo-icon {
      width: 28px; height: 28px;
      background: var(--green);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 13px;
      color: #050a06;
      overflow: hidden; flex-shrink: 0;
    }

    .topbar-logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 16px;
      color: var(--text);
    }
    .topbar-logo-text span { color: var(--green); }

    .topbar-divider {
      width: 1px; height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .topbar-title strong {
      color: var(--text);
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .status-loading {
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.3);
      color: #ffd700;
    }

    .status-ok {
      background: rgba(0,255,136,0.08);
      border: 1px solid var(--border);
      color: var(--green);
    }

    .status-error {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      color: var(--red);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Iframe area */
    .viewer-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #transcriptFrame {
      width: 100%; height: 100%;
      border: none;
      display: none;
    }

    /* Loading / error overlay */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
    }

    .overlay-icon { font-size: 48px; }

    .overlay-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .overlay-desc {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: var(--green); color: #050a06; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
  </style>
</head>

      </a>
      <div class="topbar-divider"></div>
      <div class="topbar-title">
        Transcript Viewer — <strong id="ticketName">Loading...</strong>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-pill status-loading" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusText">Loading</span>
      </div>
    </div>
  </div>

  <!-- Viewer -->
  <div class="viewer-wrap">
    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div class="overlay-title">Loading Transcript</div>
      <div class="overlay-desc">Fetching transcript from Discord...</div>
    </div>

    <iframe
      id="transcriptFrame"
      sandbox="allow-same-origin allow-scripts"
      title="Transcript"
    ></iframe>
  </div>

  <script>
    // Get ?url= from query string
    const params = new URLSearchParams(window.location.search);
    const transcriptUrl = params.get('url');
    const viewMode      = params.get('mode') || 'html'; // 'html' or 'text'

    const overlay = document.getElementById('overlay');
    const frame   = document.getElementById('transcriptFrame');
    const pill    = document.getElementById('statusPill');
    const stText  = document.getElementById('statusText');
    const tName   = document.getElementById('ticketName');

    function setStatus(state, text) {
      pill.className = 'status-pill status-' + state;
      stText.textContent = text;
    }

    function showError(title, desc, showButtons = true) {
      overlay.style.display = 'flex';
      overlay.innerHTML = `
        <div class="overlay-icon">⚠️</div>
        <div class="overlay-title">${title}</div>
        <div class="overlay-desc">${desc}</div>
        ${showButtons ? `<div style="display:flex;gap:10px;margin-top:8px">
          <a href="/" class="btn btn-outline">← Back to GrowAlert</a>
        </div>` : ''}
      `;
      setStatus('error', 'Error');
    }

    if (!transcriptUrl) {
      showError('No Transcript URL', 'No transcript URL was provided. This link may be invalid.');
    } else {
      // Extract ticket name from URL
      try {
        const urlObj = new URL(transcriptUrl);
        const filename = urlObj.pathname.split('/').pop().replace('.html', '');
        tName.textContent = filename || 'transcript';
        document.title = filename + ' — GrowAlert Transcript Viewer';
      } catch(_) {}

      const proxyUrl = '/api/transcript?url=' + encodeURIComponent(transcriptUrl);

      if (viewMode === 'text') {
        // Fetch raw text and display in a styled pre block
        fetch(proxyUrl)
          .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
          .then(text => {
            overlay.style.display = 'none';
            frame.style.display = 'none'; // hide iframe
            // Create a text display div
            const pre = document.createElement('pre');
            pre.id = 'textDisplay';
            pre.style.cssText = [
              'margin:0', 'padding:24px', 'width:100%', 'height:100%',
              'box-sizing:border-box', 'overflow:auto',
              'font-family:\'Space Mono\',monospace', 'font-size:13px',
              'line-height:1.7', 'color:#e8f5eb', 'background:#050a06',
              'white-space:pre-wrap', 'word-break:break-word'
            ].join(';');
            pre.textContent = text;
            document.querySelector('.viewer-wrap').appendChild(pre);
            setStatus('ok', 'Loaded');
          })
          .catch(err => {
            showError('Failed to Load', 'Could not load the file. The link may have expired.');
          });
      } else {
        // HTML mode — load in iframe
        frame.onload = function() {
          overlay.style.display = 'none';
          frame.style.display = 'block';
          setStatus('ok', 'Loaded');
        };
        frame.onerror = function() {
          showError('Failed to Load', 'Could not load the transcript. The link may have expired.');
        };
        const timeout = setTimeout(() => {
          if (overlay.style.display !== 'none') {
            showError('Timed Out', 'The transcript took too long to load. The Discord CDN link may have expired.');
          }
        }, 20000);
        frame.addEventListener('load', () => clearTimeout(timeout));
        frame.src = proxyUrl;
      }
    }
  </script>
</body>
